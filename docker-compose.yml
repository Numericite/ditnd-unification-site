services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maisondelautisme-site
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - "1025:1025" # SMTP
      - "1080:1080" # Web UI — http://localhost:1080

volumes:
  pgdata:
